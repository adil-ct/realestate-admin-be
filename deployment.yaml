apiVersion: apps/v1
kind: Deployment
metadata:
  name: mogul-mvp-be-admin-deployment
  namespace: mogul-dev
  labels:
    app: mogul-mvp-be-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mogul-mvp-be-admin
  template:
    metadata:
      labels:
        app: mogul-mvp-be-admin
    spec:
      volumes:
      - configMap:
          items:
          - key: .env
            path: .env
          name: mogul-mvp-be-admin
        name: dot-env

      containers:
      - name: mogul-mvp-be-admin
        image: 671826480772.dkr.ecr.us-east-1.amazonaws.com/mogul-mvp-be-admin-dev:latest
        ports:
        - containerPort: 5001
          protocol: TCP
        volumeMounts:
        - name: dot-env
          mountPath: /usr/src/app/.env
          name: dot-env
          subPath: .env
